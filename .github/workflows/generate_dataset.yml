name: Generate CAPTCHA Dataset

on:
  workflow_dispatch:
    inputs:
      num_images:
        description: 'Number of CAPTCHA images to generate'
        required: false
        default: '10000'
      min_length:
        description: 'Minimum text length'
        required: false
        default: '3'
      max_length:
        description: 'Maximum text length'
        required: false
        default: '6'

jobs:
  generate-dataset:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Install system fonts (optional)
      run: |
        sudo apt-get update
        sudo apt-get install -y fonts-dejavu fonts-liberation fonts-freefont-otf

    - name: Create directories for backplates and fonts (optional)
      run: |
        mkdir -p ./backplates ./fonts

    - name: Download sample backplates (optional - comment out if you have your own)
      run: |
        # You can replace this with your own backplate download or skip entirely
        # Example: wget -O backplates.zip "URL_TO_BACKPLATES" && unzip backplates.zip -d backplates
        echo "No backplates downloaded. Using generated backgrounds."

    - name: Generate CAPTCHA dataset
      run: |
        python generate_captcha_dataset.py \
          --output ./dataset \
          --count ${{ github.event.inputs.num_images || 10000 }} \
          --min-length ${{ github.event.inputs.min_length || 3 }} \
          --max-length ${{ github.event.inputs.max_length || 6 }} \
          --width 200 \
          --height 80 \
          --csv-name captchas.csv

    - name: Upload dataset artifact
      uses: actions/upload-artifact@v4
      with:
        name: captcha-dataset
        path: ./dataset
        retention-days: 7
        if-no-files-found: error

    - name: Display summary
      run: |
        echo "## Dataset Generation Summary" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "✅ Generated ${{ github.event.inputs.num_images || 10000 }} CAPTCHA images" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "### Output Files:" >> $GITHUB_STEP_SUMMARY
        echo "- Images: \`./dataset/images/\`" >> $GITHUB_STEP_SUMMARY
        echo "- Labels: \`./dataset/captchas.csv\`" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "### CSV Format:" >> $GITHUB_STEP_SUMMARY
        echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
        head -n 5 ./dataset/captchas.csv >> $GITHUB_STEP_SUMMARY
        echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
